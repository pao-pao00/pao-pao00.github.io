<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如何培养认真严谨的习惯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background-color: #fff;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .container {
            display: flex;
            align-items: flex-start;
            gap: 30px;
        }
        .img-box img {
            max-width: 250px;
            display: block;
        }
        .content-box {
            flex: 1;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            color: #667;
            margin-bottom: 15px;
        }
        .meta-info {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-bottom: 15px;
        }
        ul {
            list-style-type: none;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
        }
        li::before {
            content: "◆";
            color: #333;
            margin-right: 8px;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧图片，已直接嵌入 -->
        <div class="img-box">
            <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns3fr3d/2026-05-04/1746362102299819951.png~tplv-a9rns3fr3d-image.image" alt="态度决定一切 细节决定成败">
        </div>
        <!-- 右侧内容 -->
        <div class="content-box">
            <h1>如何培养认真严谨的习惯</h1>
            <div class="meta-info">
                时间:2022年02月21日17时26分 &nbsp;&nbsp;来源:思政教育
            </div>
            <ul>
                <li>反复确认。做任何事情都要照顾到每一个细节并反复确认。要有一种能在脑子里“走”多个书科过程的能力，确保所有的节点都正确。</li>
                <li>想尽办法努力让不可能变为可能只有倾尽全力了，才算是努力。</li>
                <li>结果导向 一切以结果为导向，任何事情都要留的名片，还要思考你的结果和过程是否帮助所有和你配合的人的需求。</li>
                <li>学会借鉴了解周围比你强的人，观察他们的做事方法，遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做</li>
            </ul>
        </div>
    </div>
</body>
</html>
